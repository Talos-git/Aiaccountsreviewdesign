name: Deploy Jira Preview Routes to GitHub Pages

on:
  push:
    branches:
      - "feature/MIND-415/ai-review-tab"
      - "feature/MIND-554/command-centre-triage-mode"
      - "feature/MIND-554A/command-centre-triage-mode"
      - "feature/MIND-555/kanban-board-ui"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-jira-routes-gh-pages
  cancel-in-progress: true

jobs:
  build_routes:
    name: Build ${{ matrix.jira_key }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: feature/MIND-415/ai-review-tab
            jira_key: MIND-415
          - branch: feature/MIND-554/command-centre-triage-mode
            jira_key: MIND-554
          - branch: feature/MIND-554A/command-centre-triage-mode
            jira_key: MIND-554A
          - branch: feature/MIND-555/kanban-board-ui
            jira_key: MIND-555

    steps:
      - name: Checkout route branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround for intermittent npm optional dependency resolution issues in CI.
          npm install --no-save @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu

      - name: Build route
        run: npm run build -- --base=/${{ github.event.repository.name }}/${{ matrix.jira_key }}/

      - name: Validate built asset paths
        shell: bash
        run: |
          set -euo pipefail
          expected_assets_prefix="/${GITHUB_REPOSITORY#*/}/${{ matrix.jira_key }}/assets/"

          if ! grep -q "${expected_assets_prefix}" dist/index.html; then
            echo "Expected asset prefix '${expected_assets_prefix}' was not found in dist/index.html" >&2
            sed -n '1,120p' dist/index.html
            exit 1
          fi

          if grep -q '"/${{ matrix.jira_key }}/assets/' dist/index.html; then
            echo "Detected stale asset prefix '/${{ matrix.jira_key }}/assets/' in dist/index.html" >&2
            sed -n '1,120p' dist/index.html
            exit 1
          fi

      - name: Stage route artifact
        run: |
          mkdir -p preview/${{ matrix.jira_key }}
          cp -R dist/. preview/${{ matrix.jira_key }}/

      - name: Upload route artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-${{ matrix.jira_key }}
          path: preview/${{ matrix.jira_key }}
          if-no-files-found: error

  deploy_site:
    name: Deploy GitHub Pages Snapshot
    runs-on: ubuntu-latest
    needs: build_routes

    steps:
      - name: Download MIND-415 artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-MIND-415
          path: site/MIND-415

      - name: Download MIND-554 artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-MIND-554
          path: site/MIND-554

      - name: Download MIND-554A artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-MIND-554A
          path: site/MIND-554A

      - name: Download MIND-555 artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-MIND-555
          path: site/MIND-555

      - name: Validate staged routes
        shell: bash
        run: |
          set -euo pipefail
          for jira_key in MIND-415 MIND-554 MIND-554A MIND-555; do
            if [[ ! -f "site/${jira_key}/index.html" ]]; then
              echo "Missing site/${jira_key}/index.html in staged deployment output" >&2
              exit 1
            fi
          done

      - name: Create root landing page
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>AI Accounts Review Previews</title>
              <style>
                body {
                  margin: 0;
                  padding: 2rem;
                  font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
                  background: #f7f7f8;
                  color: #111827;
                }
                main {
                  max-width: 720px;
                  margin: 0 auto;
                  background: #ffffff;
                  border: 1px solid #e5e7eb;
                  border-radius: 12px;
                  padding: 1.5rem;
                }
                h1 {
                  margin-top: 0;
                  margin-bottom: 0.5rem;
                  font-size: 1.5rem;
                }
                ul {
                  padding-left: 1.25rem;
                }
                li {
                  margin: 0.5rem 0;
                }
                a {
                  color: #2563eb;
                  text-decoration: none;
                }
                a:hover {
                  text-decoration: underline;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>AI Accounts Review Preview Routes</h1>
                <p>Select a Jira preview deployment:</p>
                <ul>
                  <li><a href="./MIND-415/">MIND-415</a></li>
                  <li><a href="./MIND-554/">MIND-554</a></li>
                  <li><a href="./MIND-554A/">MIND-554A</a></li>
                  <li><a href="./MIND-555/">MIND-555</a></li>
                </ul>
              </main>
            </body>
          </html>
          HTML
          cp site/index.html site/404.html
          touch site/.nojekyll

      - name: Deploy full site snapshot to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          keep_files: false
